<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Jordan – Chicago Bulls Seasons</title>

  <link href="https://fonts.cdnfonts.com/css/jersey-m54" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <h1 class="bulls-outline">Michael Jordan – Chicago Bulls Seasons</h1>
    <button id="darkToggle" class="toggle-btn">Dark Mode</button>
  </header>

  <!-- Timeline -->
  <section id="timeline" class="timeline"></section>

  <!-- Season Cards -->
  <section id="seasons"></section>

  <!-- GOAT Comparison -->
  <section id="goat" class="compare">
    <h2 class="bulls-font">GOAT Comparison</h2>

    <select id="goatSelect" onchange="compareGOAT()">
      <option>LeBron James</option>
      <option>Kobe Bryant</option>
      <option>Kareem Abdul-Jabbar</option>
      <option>Bill Russell</option>
    </select>

    <div id="goatResult" class="comparison-box"></div>
  </section>

  <!-- Dynamic GOAT Case -->
  <section id="goatCase" class="goat-callout"></section>

</body>
</html>
