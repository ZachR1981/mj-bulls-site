<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Jordan – Chicago Bulls Seasons</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo-row">
      <img src="https://upload.wikimedia.org/wikipedia/en/6/67/Chicago_Bulls_logo.svg" class="logo">
    </div>

    <h1>Michael Jordan – Chicago Bulls Career</h1>

    <button id="darkToggle" class="toggle-btn">Toggle Dark Mode</button>
  </header>

  <!-- TIMELINE -->
  <div id="timeline" class="timeline"></div>

  <!-- SEASON CARDS -->
  <div id="seasons" class="seasons-container"></div>

  <!-- PLAYER COMPARISON MODULE -->
  <section class="compare">
    <h2>Player Comparison</h2>
    <p>Select a season and a teammate to compare with Michael Jordan.</p>

    <select id="seasonSelect"></select>
    <select id="playerSelect"></select>

    <button class="toggle-btn" onclick="comparePlayers()">Compare</button>

    <div id="comparisonResult" class="comparison-box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
