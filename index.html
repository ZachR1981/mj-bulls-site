<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Jordan – Chicago Bulls Seasons</title>

  <!-- Bulls-style font -->
  <link href="https://fonts.cdnfonts.com/css/jersey-m54" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- PapaParse CSV Parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Main Script (must load AFTER PapaParse) -->
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <h1 class="title">Michael Jordan – Chicago Bulls Seasons</h1>
    <button id="darkToggle" class="dark-toggle">Dark Mode</button>
  </header>

  <!-- Timeline -->
  <section id="timeline" class="timeline"></section>

  <!-- Season Cards -->
  <section id="seasons" class="seasons"></section>

  <!-- GOAT Comparison -->
  <section id="goat" class="goat-section">
    <h2>GOAT Comparison</h2>

    <select id="goatSelect" onchange="compareGOAT()">
      <option>LeBron James</option>
      <option>Kobe Bryant</option>
      <option>Kareem Abdul-Jabbar</option>
      <option>Bill Russell</option>
    </select>

    <div id="goatResult" class="goat-result"></div>
  </section>

</body>
</html>
